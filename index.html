<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Ekranı -->
    <div class="container" id="auth-container">
        <h1>Yapılacaklar</h1>
        <div id="auth-message" class="auth-message"></div>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Giriş Yap</button>
            <button class="auth-tab" data-tab="register">Kayıt Ol</button>
        </div>
        <form id="login-form" class="auth-form">
            <input type="email" id="login-email" placeholder="E-posta" required>
            <input type="password" id="login-password" placeholder="Şifre" minlength="6" required>
            <button type="submit">Giriş Yap</button>
        </form>
        <form id="register-form" class="auth-form hidden">
            <input type="email" id="register-email" placeholder="E-posta" required>
            <input type="password" id="register-password" placeholder="Şifre (en az 6 karakter)" minlength="6" required>
            <button type="submit">Kayıt Ol</button>
        </form>
    </div>

    <!-- Todo Ekranı -->
    <div class="container hidden" id="app-container">
        <div class="app-header">
            <h1>Yapılacaklar</h1>
            <div class="user-info">
                <span id="user-email"></span>
                <button id="logout-btn">Çıkış</button>
            </div>
        </div>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Yeni görev ekle..." autocomplete="off">
            <button type="submit">Ekle</button>
        </form>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tümü</button>
            <button class="filter-btn" data-filter="active">Aktif</button>
            <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>
        <ul id="todo-list"></ul>
        <div class="footer" id="footer">
            <span id="count"></span>
            <button id="clear-completed">Tamamlananları Temizle</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
